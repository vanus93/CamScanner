<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamScanner - Auto Crop & Shadow Removal</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- OpenCV.js untuk Auto-Crop & Hapus Bayangan lanjutan -->
  <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="onOpenCvReady()"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="text-center space-y-2 border-b border-slate-800 pb-6">
      <h1 class="text-3xl font-bold text-emerald-400 flex items-center justify-center gap-2">
        <span>📑</span> CamScanner AI Auto-Fit
      </h1>
      <p class="text-slate-400 text-sm">Auto-crop sudut kertas & hapus bayangan gelap secara presisi.</p>
      <div id="cvStatus" class="text-xs text-amber-400 font-semibold animate-pulse">Memuat Mesin Pemroses Gambar (OpenCV)...</div>
    </header>

    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 space-y-4 shadow-lg">
      
      <!-- Input File -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">AMBIL FOTO / UNGGAH DOKUMEN</label>
        <input type="file" id="imageInput" accept="image/*" capture="environment" disabled
          class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer" />
      </div>

      <!-- Live Canvas Hasil Auto Crop -->
      <div id="previewContainer" class="hidden space-y-3">
        <div class="flex justify-between items-center">
          <label class="block text-xs font-semibold text-slate-400">HASIL AUTO CROP & SCAN</label>
          <button onclick="processAutoCropAndFilter()" class="text-xs bg-slate-700 hover:bg-slate-600 px-2.5 py-1 rounded text-emerald-400">
            🔄 Proses Ulang
          </button>
        </div>
        
        <div class="overflow-hidden rounded-lg bg-slate-950 border border-slate-700 p-2 text-center">
          <canvas id="outputCanvas" class="max-h-[380px] mx-auto rounded shadow-md border border-slate-800"></canvas>
        </div>
      </div>

      <!-- Pilihan Filter Pembersih Bayangan -->
      <div id="controlsContainer" class="hidden space-y-3 pt-2 border-t border-slate-700">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">MODE HAPUS BAYANGAN & PERCANTIK</label>
          <select id="filterSelect" onchange="applyCurrentFilter()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-slate-200">
            <option value="magic">Magic Color (Hapus Bayangan Total & Kertas Putih Clean)</option>
            <option value="adaptive">Adaptive Document (Ratakan Cahaya & Pertajam Tinta)</option>
            <option value="bw">Hitam Putih Murni (Teks Kontras Tinggi)</option>
            <option value="original">Warna Asli (Hanya Crop & Ratakan Sudut)</option>
          </select>
        </div>

        <button onclick="downloadPDF()" 
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg transition shadow-md flex items-center justify-center gap-2">
          <span>📥</span> Unduh PDF Pas & Rapi
        </button>
      </div>

    </div>

  </div>

  <!-- Element gambar tersembunyi untuk proses internal -->
  <img id="srcImage" class="hidden" />

  <script>
    let cvReady = false;
    let croppedMat = null; // Menyimpan matriks opencv hasil potong

    function onOpenCvReady() {
      cvReady = true;
      document.getElementById('cvStatus').innerText = "✅ Mesin AI Siap Digunakan!";
      document.getElementById('cvStatus').className = "text-xs text-emerald-400 font-semibold";
      document.getElementById('imageInput').disabled = false;
    }

    document.getElementById('imageInput').addEventListener('change', function(e) {
      if (!cvReady) return;
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          const img = document.getElementById('srcImage');
          img.onload = function() {
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('controlsContainer').classList.remove('hidden');
            processAutoCropAndFilter();
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // 1. Algoritma AUTO CROP (Deteksi Tepian Kertas & Perspective Warp)
    function processAutoCropAndFilter() {
      const img = document.getElementById('srcImage');
      let src = cv.imread(img);
      let gray = new cv.Mat();
      
      // Ubah ke Grayscale & Blur untuk cari tepi kertas
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
      
      // Canny Edge Detection
      let edges = new cv.Mat();
      cv.Canny(gray, edges, 75, 200);

      // Cari Kontur Terbesar (Diasumsikan Kertas Dokumen)
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();
      cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

      let maxArea = 0;
      let maxContour = null;

      for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);
        if (area > 5000) {
          let peri = cv.arcLength(cnt, true);
          let approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
          
          if (approx.rows === 4 && area > maxArea) { // Menemukan 4 sudut
            maxArea = area;
            maxContour = approx;
          } else {
            approx.delete();
          }
        }
      }

      // Jika 4 sudut kertas ditemukan, lakukan Warp/Auto Crop. Jika tidak, pakai full gambar
      if (maxContour) {
        croppedMat = warpPerspective(src, maxContour);
        maxContour.delete();
      } else {
        croppedMat = src.clone(); // Fallback jika sudut kurang jelas
      }

      applyCurrentFilter();

      // Memory Cleanup
      src.delete(); gray.delete(); edges.delete();
      contours.delete(); hierarchy.delete();
    }

    // Transformasi Presisi (Meluruskan Kertas Miring)
    function warpPerspective(src, cornerMat) {
      let pts = [];
      for (let i = 0; i < 4; i++) {
        pts.push({ x: cornerMat.data32S[i * 2], y: cornerMat.data32S[i * 2 + 1] });
      }

      // Urutkan titik: top-left, top-right, bottom-right, bottom-left
      pts.sort((a, b) => a.y - b.y);
      let topRow = pts.slice(0, 2).sort((a, b) => a.x - b.x);
      let bottomRow = pts.slice(2, 4).sort((a, b) => a.x - b.x);
      
      let tl = topRow[0], tr = topRow[1], br = bottomRow[1], bl = bottomRow[0];

      let widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
      let widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
      let maxWidth = Math.max(widthA, widthB);

      let heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
      let heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
      let maxHeight = Math.max(heightA, heightB);

      let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
      let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth - 1, 0, maxWidth - 1, maxHeight - 1, 0, maxHeight - 1]);

      let M = cv.getPerspectiveTransform(srcTri, dstTri);
      let dst = new cv.Mat();
      cv.warpPerspective(src, dst, M, new cv.Size(maxWidth, maxHeight));

      srcTri.delete(); dstTri.delete(); M.delete();
      return dst;
    }

    // 2. Algoritma HAPUS BAYANGAN & FILTER (Adaptive Division)
    function applyCurrentFilter() {
      if (!croppedMat) return;

      let filter = document.getElementById('filterSelect').value;
      let dst = new cv.Mat();

      if (filter === 'magic') {
        // Hapus Bayangan dengan Pembagian Iluminasi Latar Belakang (Illumination Division)
        let gray = new cv.Mat();
        cv.cvtColor(croppedMat, gray, cv.COLOR_RGBA2GRAY);
        
        let dilated = new cv.Mat();
        let kernel = cv.Mat.ones(7, 7, cv.CV_8U);
        cv.dilate(gray, dilated, kernel);
        cv.medianBlur(dilated, dilated, 21);

        // Bagi citra asli dengan estimasi bayangan
        let diff = new cv.Mat();
        cv.absdiff(gray, dilated, diff);
        cv.bitwise_not(diff, diff);
        
        cv.normalize(diff, dst, 0, 255, cv.NORM_MINMAX, cv.CV_8U);

        gray.delete(); dilated.delete(); kernel.delete(); diff.delete();
      } 
      else if (filter === 'adaptive') {
        // Adaptive Thresholding untuk menghilangkan bayangan bertahap
        let gray = new cv.Mat();
        cv.cvtColor(croppedMat, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 21, 10);
        gray.delete();
      } 
      else if (filter === 'bw') {
        let gray = new cv.Mat();
        cv.cvtColor(croppedMat, gray, cv.COLOR_RGBA2GRAY);
        cv.threshold(gray, dst, 125, 255, cv.THRESH_BINARY);
        gray.delete();
      } 
      else {
        dst = croppedMat.clone();
      }

      // Tampilkan Hasil ke Canvas
      cv.imshow('outputCanvas', dst);
      dst.delete();
    }

    // 3. Simpan Ke PDF Pas Tanpa Margin
    function downloadPDF() {
      const canvas = document.getElementById('outputCanvas');
      const { jsPDF } = window.jspdf;
      
      const isLandscape = canvas.width > canvas.height;
      const pdf = new jsPDF({
        orientation: isLandscape ? 'l' : 'p',
        unit: 'px',
        format: [canvas.width, canvas.height]
      });

      pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
      pdf.save(`CamScanner_Auto_${Date.now()}.pdf`);
    }
  </script>
</body>
</html>
