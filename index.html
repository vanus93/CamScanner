<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamScanner PDF - Smart Enhance</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="text-center space-y-2 border-b border-slate-800 pb-6">
      <h1 class="text-3xl font-bold text-emerald-400 flex items-center justify-center gap-2">
        <span>✨</span> CamScanner Smart Enhancer
      </h1>
      <p class="text-slate-400 text-sm">Koreksi pencahayaan, tingkatkan kontras, dan bersihkan bayangan kertas secara otomatis.</p>
    </header>

    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 space-y-4 shadow-lg">
      
      <!-- Input File -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">AMBIL FOTO / UNGGAH DOKUMEN</label>
        <input type="file" id="imageInput" accept="image/*" capture="environment" 
          class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-500 cursor-pointer" />
      </div>

      <!-- Area Crop -->
      <div id="cropContainer" class="hidden space-y-3">
        <div class="flex justify-between items-center">
          <label class="block text-xs font-semibold text-slate-400">PAS-KAN AREA DOKUMEN</label>
          <div class="flex gap-2">
            <button onclick="rotateImage(-90)" class="bg-slate-700 hover:bg-slate-600 text-xs px-2.5 py-1 rounded">↺ Kiri</button>
            <button onclick="rotateImage(90)" class="bg-slate-700 hover:bg-slate-600 text-xs px-2.5 py-1 rounded">↻ Kanan</button>
          </div>
        </div>
        <div class="max-h-[350px] overflow-hidden rounded-lg bg-slate-950 border border-slate-700">
          <img id="imageToCrop" class="max-w-full block" />
        </div>
      </div>

      <!-- Kontrol Kecerahan, Kontras & Filter -->
      <div id="controlsContainer" class="hidden space-y-4 pt-3 border-t border-slate-700">
        
        <!-- Preset Filter -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">PILIH MODE WAKTU/FILTER</label>
          <select id="filterSelect" onchange="processEnhance()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-slate-200 focus:outline-none focus:border-emerald-500">
            <option value="magic">Magic Color (Pembersih Bayangan + Kertas Putih)</option>
            <option value="vibrant">Warna Tajam (Untuk Dokumen Berwarna/Sertifikat)</option>
            <option value="bw">Hitam Putih Murni (Teks Sangat Kontras)</option>
            <option value="original">Warna Asli</option>
          </select>
        </div>

        <!-- Slider Manual Koreksi Cahaya -->
        <div class="grid grid-cols-2 gap-4 bg-slate-900/60 p-3 rounded-lg border border-slate-750">
          <div>
            <div class="flex justify-between text-xs text-slate-400 mb-1">
              <span>Kecerahan</span>
              <span id="brightnessVal">0</span>
            </div>
            <input type="range" id="brightness" min="-50" max="50" value="0" oninput="updateSliders()" class="w-full accent-emerald-500 cursor-pointer" />
          </div>
          <div>
            <div class="flex justify-between text-xs text-slate-400 mb-1">
              <span>Kontras</span>
              <span id="contrastVal">20</span>
            </div>
            <input type="range" id="contrast" min="-50" max="100" value="20" oninput="updateSliders()" class="w-full accent-emerald-500 cursor-pointer" />
          </div>
        </div>

        <!-- Ukuran PDF & Tombol Generate -->
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">UKURAN KERTAS PDF</label>
            <select id="pageSizeSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-slate-200">
              <option value="fit">Presisi Foto (Tanpa Margin / Area Kosong)</option>
              <option value="a4">Kertas A4 (Center)</option>
            </select>
          </div>

          <button onclick="downloadPDF()" 
            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg transition shadow-md flex items-center justify-center gap-2">
            <span>📥</span> Simpan ke PDF
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- Hidden Canvas untuk pemrosesan citra -->
  <canvas id="processCanvas" class="hidden"></canvas>

  <script>
    let cropper = null;

    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          const img = document.getElementById('imageToCrop');
          img.src = evt.target.result;
          
          document.getElementById('cropContainer').classList.remove('hidden');
          document.getElementById('controlsContainer').classList.remove('hidden');

          if (cropper) cropper.destroy();

          cropper = new Cropper(img, {
            viewMode: 1,
            autoCropArea: 0.98,
            responsive: true,
          });
        };
        reader.readAsDataURL(file);
      }
    });

    function rotateImage(degree) {
      if (cropper) cropper.rotate(degree);
    }

    function updateSliders() {
      document.getElementById('brightnessVal').innerText = document.getElementById('brightness').value;
      document.getElementById('contrastVal').innerText = document.getElementById('contrast').value;
    }

    // Algoritma Pemrosesan Warna dan Cahaya
    function getEnhancedCanvas() {
      if (!cropper) return null;

      const croppedCanvas = cropper.getCroppedCanvas({
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });

      const canvas = document.getElementById('processCanvas');
      canvas.width = croppedCanvas.width;
      canvas.height = croppedCanvas.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(croppedCanvas, 0, 0);

      const filterMode = document.getElementById('filterSelect').value;
      const userBrightness = parseInt(document.getElementById('brightness').value);
      const userContrast = parseInt(document.getElementById('contrast').value);

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      // Nilai Koreksi Kontras
      const contrastFactor = (259 * (userContrast + 255)) / (255 * (259 - userContrast));

      for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        // 1. Terapkan Brightness & Contrast Manual lebih dulu
        r = contrastFactor * (r + userBrightness - 128) + 128;
        g = contrastFactor * (g + userBrightness - 128) + 128;
        b = contrastFactor * (b + userBrightness - 128) + 128;

        let luminance = 0.299 * r + 0.587 * g + 0.114 * b;

        // 2. Terapkan Filter Sesuai Mode
        if (filterMode === 'magic') {
          // Pembersih Bayangan & Peningkat Teks
          if (luminance > 140) {
            // Latar belakang diangkat ke warna putih terang
            r = g = b = 255;
          } else {
            // Teks/Gambar dipertajam
            r = Math.max(0, r * 0.7);
            g = Math.max(0, g * 0.7);
            b = Math.max(0, b * 0.7);
          }
        } 
        else if (filterMode === 'vibrant') {
          // Penguat Warna (Color Boost) tanpa memutihkan total
          let saturation = 1.3;
          r = luminance + saturation * (r - luminance);
          g = luminance + saturation * (g - luminance);
          b = luminance + saturation * (b - luminance);
        }
        else if (filterMode === 'bw') {
          // Hitam Putih Murni
          let bwVal = luminance > 130 ? 255 : 0;
          r = g = b = bwVal;
        }

        // Clamp nilai ke rentang 0 - 255
        data[i]     = Math.min(255, Math.max(0, r));
        data[i + 1] = Math.min(255, Math.max(0, g));
        data[i + 2] = Math.min(255, Math.max(0, b));
      }

      ctx.putImageData(imgData, 0, 0);
      return canvas;
    }

    function downloadPDF() {
      const canvas = getEnhancedCanvas();
      if (!canvas) return;

      const { jsPDF } = window.jspdf;
      const pageSize = document.getElementById('pageSizeSelect').value;
      const isLandscape = canvas.width > canvas.height;

      let pdf;

      if (pageSize === 'fit') {
        pdf = new jsPDF({
          orientation: isLandscape ? 'l' : 'p',
          unit: 'px',
          format: [canvas.width, canvas.height]
        });
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, canvas.width, canvas.height);
      } else {
        pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        
        const ratio = Math.min(pdfWidth / canvas.width, pdfHeight / canvas.height);
        const imgWidth = canvas.width * ratio;
        const imgHeight = canvas.height * ratio;
        
        const x = (pdfWidth - imgWidth) / 2;
        const y = (pdfHeight - imgHeight) / 2;

        pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', x, y, imgWidth, imgHeight);
      }

      pdf.save(`Scan_Enhance_${Date.now()}.pdf`);
    }
  </script>
</body>
</html>
