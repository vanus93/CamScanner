<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamScanner PDF - Perfect Layout</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF untuk generate PDF di browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="text-center space-y-2 border-b border-slate-800 pb-6">
      <h1 class="text-3xl font-bold text-emerald-400 flex items-center justify-center gap-2">
        <span>📸</span> CamScanner PDF Converter
      </h1>
      <p class="text-slate-400 text-sm">Ubah foto dokumen menjadi PDF bersih tanpa merubah tata letak/layout asli sedikitpun.</p>
    </header>

    <!-- Controls -->
    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 space-y-4 shadow-lg">
      
      <!-- Input File -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">AMBIL FOTO / UNGGAH DOKUMEN</label>
        <input type="file" id="imageInput" accept="image/*" capture="environment" 
          class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-500 cursor-pointer" />
      </div>

      <!-- Filter Option -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">EFEK FILTER PERCANTIK</label>
        <select id="filterSelect" onchange="applyFilter()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-slate-200 focus:outline-none focus:border-emerald-500">
          <option value="magic">1. Magic Color (Latar Putih, Teks Kontras - Khas CamScanner)</option>
          <option value="bw">2. B&W Document (Hitam Putih Murni)</option>
          <option value="grayscale">3. Grayscale (Abu-abu Halus)</option>
          <option value="original">4. Asli (Tanpa Filter)</option>
        </select>
      </div>

      <!-- Preview Live Canvas -->
      <div id="previewContainer" class="hidden space-y-2 text-center pt-2">
        <label class="block text-xs font-semibold text-slate-400">PREVIEW HASIL SCAN</label>
        <div class="overflow-hidden rounded-lg border border-slate-700 bg-slate-950 p-2 inline-block max-w-full">
          <canvas id="docCanvas" class="max-h-96 mx-auto rounded shadow-md"></canvas>
        </div>
      </div>

      <!-- Tombol Generate PDF -->
      <button onclick="downloadPDF()" id="btnDownload" disabled
        class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition shadow-md flex items-center justify-center gap-2">
        <span>📥</span> Unduh Dokumen PDF
      </button>

    </div>

  </div>

  <script>
    let originalImage = null;
    const canvas = document.getElementById('docCanvas');
    const ctx = canvas.getContext('2d');

    // Load Gambar ketika dipilih
    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          originalImage = new Image();
          originalImage.onload = function() {
            // Atur ukuran canvas sesuai gambar asli
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            
            // Tampilkan preview dan jalankan filter
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('btnDownload').disabled = false;
            applyFilter();
          };
          originalImage.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Algoritma Pemrosesan Citra (Filter CamScanner)
    function applyFilter() {
      if (!originalImage) return;

      // Gambar ulang foto asli ke canvas
      ctx.drawImage(originalImage, 0, 0);

      const filter = document.getElementById('filterSelect').value;
      if (filter === 'original') return;

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      // Iterasi setiap piksel gambar
      for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        // Hitung nilai kecerahan (luminance)
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;

        if (filter === 'grayscale') {
          data[i] = gray;
          data[i + 1] = gray;
          data[i + 2] = gray;
        } 
        else if (filter === 'magic') {
          // Filter Magic Color: Menaikkan kontras & memutihkan latar belakang
          let factor = 1.5; // Kontras
          let highContrast = factor * (gray - 128) + 128;
          
          // Ambang batas (threshold) untuk membuat kertas jadi putih terang
          if (highContrast > 160) {
            highContrast = 255; 
          }

          data[i] = Math.min(255, Math.max(0, highContrast));
          data[i + 1] = Math.min(255, Math.max(0, highContrast));
          data[i + 2] = Math.min(255, Math.max(0, highContrast));
        } 
        else if (filter === 'bw') {
          // Hitam Putih Murni (Thresholding)
          let v = (gray > 120) ? 255 : 0;
          data[i] = v;
          data[i + 1] = v;
          data[i + 2] = v;
        }
      }

      // Tampilkan kembali hasil editan piksel ke canvas
      ctx.putImageData(imgData, 0, 0);
    }

    // Fungsi Konversi Canvas ke PDF
    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      
      // Ambil orientasi gambar (potret / lanskap)
      const isLandscape = canvas.width > canvas.height;
      
      // Inisialisasi dokumen PDF
      const pdf = new jsPDF({
        orientation: isLandscape ? 'l' : 'p',
        unit: 'px',
        format: [canvas.width, canvas.height] // Ukuran PDF persis seluas gambar
      });

      // Masukkan gambar hasil filter canvas ke dalam PDF
      const imgDataUrl = canvas.toDataURL('image/jpeg', 0.95);
      pdf.addImage(imgDataUrl, 'JPEG', 0, 0, canvas.width, canvas.height);

      // Simpan file
      pdf.save(`Scan_Dokumen_${Date.now()}.pdf`);
    }
  </script>
</body>
</html>
